<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — KinoLove</title>
    <link rel="stylesheet" href=".\css\style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">KinoLove</div>
            <nav>
                <ul class="nav-list">
                <li class="dropdown">
                    <a class="dropdown-toggle">▼</a>
                    <ol class="dropdown-menu">
                        <li><a href=".\collections\index.html">Каталог</a></li>
                        <li><a href="#">Рецензії</a></li>
                    </ol>
                </li>
                <li>
                <li><a href=".\index.html">Головна</a></li>
                <li><a href="login.html">Увійти</a></li>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-wrapper">
            <div class="auth-box">
                <h2>Створення акаунту</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Ім'я</label>
                        <input type="text" id="name" name="name" required placeholder="Ваше ім'я">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" required minlength="8" placeholder="Мінімум 8 символів">
                    </div>
                    <div class="form-group">
                        <label for="user_phone">Контактний телефон (формат: +380...):</label>
                        <input type="tel" id="user_phone" name="user_phone" 
                            placeholder="+380991234567" 
                            pattern="^\+380\d{9}$" 
                            required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Створити акаунт</button>
                </form>
                <p class="auth-link">Вже є акаунт? <a href="login.html">Увійти</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 KinoLove. Всі права захищені.</p>
        </div>
    </footer>
</body>
</html>
